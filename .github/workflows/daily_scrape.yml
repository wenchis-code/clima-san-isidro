name: Monitor Clima San Isidro

on:
  schedule:
    # Corre cada 3 horas (00:45, 03:45, 06:45, etc. en hora UTC)
    - cron: '45 */3 * * *'
  workflow_dispatch: # Permite ejecución manual desde la pestaña Actions

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Instalar librerias
        run: pip install pandas requests beautifulsoup4

      - name: Ejecutar script de captura
        run: python captura_clima.py

      - name: Guardar y subir cambios al repositorio
        run: |
          git config --global user.name "ClimaBot"
          git config --global user.email "bot@github.com"
          git add registro_clima_san_isidro.csv graficos/*
          git commit -m "Captura automatica de datos" || exit 0
          git push
