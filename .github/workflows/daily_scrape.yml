name: Monitor Clima San Isidro

on:
  schedule:
    - cron: '45 */3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install pandas requests beautifulsoup4

      - name: Run Script
        run: python captura_clima.py

      - name: Commit and Push
        run: |
          git config --global user.name "ClimaBot"
          git config --global user.email "bot@github.com"
          git add registro_clima_san_isidro.csv
          git commit -m "Captura automatica" || exit 0
          git push origin main
