<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clima San Isidro - Histórico</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css" rel="stylesheet">
    
    <style>
        body { padding: 20px; background-color: #f8f9fa; }
        .container { background-color: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); max-width: 100%; overflow-x: auto; }
        h1 { color: #0d6efd; margin-bottom: 20px; }
        /* Hacemos que la tabla no se rompa en pantallas chicas */
        table { white-space: nowrap; } 
    </style>
</head>
<body>

<div class="container">
    <h1><i class="bi bi-cloud-sun"></i> Registro Histórico: Hipódromo San Isidro</h1>
    <p>Datos actualizados automáticamente desde la estación meteorológica.</p>
    
    <table id="tablaClima" class="table table-striped table-bordered" style="width:100%">
        </table>
</div>

<script src="https://code.jquery.com/jquery-3.7.0.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<script>
    $(document).ready(function() {
        // 1. Le decimos a PapaParse que busque tu archivo CSV
        Papa.parse("registro_clima_san_isidro.csv", {
            download: true,       // Que lo descargue
            header: true,         // Que use la primera fila como títulos
            skipEmptyLines: true, // Que ignore líneas vacías
            complete: function(results) {
                // 2. Cuando termina de leer, preparamos los datos
                var datos = results.data;
                var columnas = [];
                
                // 3. Extraemos los títulos de las columnas del CSV
                if (datos.length > 0) {
                    var primerasLlaves = Object.keys(datos[0]);
                    primerasLlaves.forEach(function(llave) {
                        columnas.push({ title: llave, data: llave });
                    });
                }

                // 4. Inicializamos la "Tabla Mágica"
                $('#tablaClima').DataTable({
                    data: datos,
                    columns: columnas,
                    order: [[0, 'desc']], // Ordenar por la primera columna (Fecha) de más nuevo a más viejo
                    language: {
                        url: '//cdn.datatables.net/plug-ins/1.13.6/i18n/es-ES.json' // Que los menús estén en español
                    },
                    scrollX: true // Agrega barra de desplazamiento horizontal si hay muchas columnas
                });
            }
        });
    });
</script>

</body>
</html>
